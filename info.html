<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Info</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header Consistente */
        header { padding: 20px 6%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo-container { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 1.8rem; color: var(--accent-primary); }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); letter-spacing: 1px; }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-menu a:hover { color: var(--accent-primary); }

        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; width: 250px; }

        /* Menú Hamburguesa (oculto en PC) */
        .menu-btn { display: none; font-size: 1.5rem; cursor: pointer; color: white; }
        .mobile-nav { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #111; padding: 20px; border-bottom: 1px solid #333; flex-direction: column; gap: 15px; z-index: 999; }
        .mobile-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 1.2rem; }

        /* Contenido */
        .container { padding: 40px 6%; max-width: 1000px; margin: auto; }
        
        .manga-header { display: flex; gap: 30px; margin-bottom: 40px; background: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .manga-header img { width: 220px; border-radius: 8px; object-fit: cover; }
        
        .btn-action { background: #1a1a1a; padding: 12px 24px; border-radius: 6px; text-decoration: none; color: white; border: 1px solid #333; display: inline-block; margin-right: 10px; transition: 0.3s; }
        .btn-action:hover { border-color: var(--accent-primary); }
        
        .btn-fav { background: #333; color: white; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-fav.active { background: var(--accent-primary); color: white; }

        /* Lista de Capítulos */
        h2 { color: var(--text-main); margin-bottom: 20px; }
        .chapter-list { display: flex; flex-direction: column; gap: 10px; }
        .cap-btn { background: #0d0d0d; padding: 15px; border-radius: 8px; text-decoration: none; color: white; border: 1px solid #222; display: flex; justify-content: space-between; transition: 0.2s; }
        .cap-btn:hover { border-color: var(--accent-primary); }
        .cap-btn span:last-child { color: var(--accent-primary); font-weight: 600; }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            header { position: relative; padding: 15px 4%; }
            .nav-menu { display: none; }
            .menu-btn { display: block; }
            .logo-container { position: absolute; left: 50%; transform: translateX(-50%); }
            #search { width: 100px; padding: 6px 12px; font-size: 0.8rem; }
            
            .manga-header { flex-direction: column; align-items: center; text-align: center; }
            .manga-header img { width: 100%; max-width: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="logo-container" onclick="location.href='index.html'">
            <span class="logo-text">RIPSCAN</span>
        </div>

        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html">Mis Manhwas</a>
        </nav>

        <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">

        <div class="mobile-nav" id="mobileMenu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html">Mis Manhwas</a>
        </div>
    </header>

    <div class="container">
        <div class="manga-header">
            <img id="mangaImg" src="">
            <div>
                <h1 id="mangaTitle" style="color: var(--text-main); margin-bottom: 15px;">Cargando...</h1>
                <div style="margin: 20px 0;">
                    <a id="btnPrimero" class="btn-action">Primer Cap</a>
                    <a id="btnUltimo" class="btn-action">Último Cap</a>
                    <button id="btnFav" class="btn-fav" onclick="toggleFav()">❤️ Favoritos</button>
                </div>
                <p id="sinopsis" style="color: var(--text-muted); line-height: 1.6;"></p>
            </div>
        </div>

        <h2>Capítulos</h2>
        <div id="listaCaps" class="chapter-list"></div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        const id = new URLSearchParams(window.location.search).get('manga');
        
        function toggleFav() {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if (favs.includes(id)) { 
                favs = favs.filter(i => i !== id); 
                document.getElementById('btnFav').classList.remove('active'); 
            } else { 
                favs.push(id); 
                document.getElementById('btnFav').classList.add('active'); 
            }
            localStorage.setItem('favs', JSON.stringify(favs));
        }

        function handleSearch(e) {
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`;
        }

        fetch('mangas.json').then(r => r.json()).then(data => {
            const m = data.find(x => x.id === id);
            if (!m) return;
            
            document.getElementById('mangaImg').src = m.imagen;
            document.getElementById('mangaTitle').innerText = m.titulo;
            document.getElementById('sinopsis').innerText = m.sinopsis;
            document.getElementById('btnPrimero').href = `lector.html?manga=${id}&cap=1`;
            document.getElementById('btnUltimo').href = `lector.html?manga=${id}&cap=${m.totalCaps}`;
            
            if (JSON.parse(localStorage.getItem('favs') || '[]').includes(id)) {
                document.getElementById('btnFav').classList.add('active');
            }

            const list = document.getElementById('listaCaps');
            for(let i=1; i<=m.totalCaps; i++) {
                list.innerHTML += `<a href="lector.html?manga=${id}&cap=${i}" class="cap-btn"><span>Capítulo ${i}</span><span>Leer →</span></a>`;
            }
        });
    </script>
</body>
</html>
