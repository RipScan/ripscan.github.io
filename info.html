<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Información</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; --card: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Header Global (Consistente en todo el sitio) */
        header { 
            padding: 10px 5%; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-menu { display: flex; gap: 15px; }
        .nav-menu a { color: #aaa; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .nav-menu a:hover { color: var(--accent); }
        #search { background: #111; border: 1px solid #333; color: white; padding: 5px 12px; border-radius: 15px; width: 120px; font-size: 0.8rem; }

        /* Contenido de Info */
        .container { padding: 40px 5%; max-width: 800px; margin: auto; }
        .manga-header { display: flex; gap: 30px; margin-bottom: 40px; }
        .manga-header img { width: 200px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sinopsis { color: #ccc; line-height: 1.6; }
        
        .cap-list { display: grid; gap: 10px; margin-top: 20px; }
        .cap-btn { 
            background: var(--card); padding: 15px; border-radius: 8px; text-decoration: none; 
            color: white; border: 1px solid #1a1a1a; display: flex; justify-content: space-between;
            transition: 0.3s;
        }
        .cap-btn:hover { border-color: var(--accent); background: #151515; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">RIPSCAN</div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="#" onclick="alert('Funcionalidad en desarrollo')">Mis Manhwas</a>
        </nav>
        <input type="text" id="search" placeholder="🔍 Buscar..." onkeyup="handleSearch(event)">
    </header>

    <div class="container">
        <div class="manga-header">
            <img id="mangaImg" src="" alt="Portada">
            <div>
                <h1 id="mangaTitle" style="margin:0; color:var(--accent);">Cargando...</h1>
                <p id="sinopsis" class="sinopsis"></p>
            </div>
        </div>
        
        <h2 style="margin-top: 40px;">Capítulos</h2>
        <div class="cap-list" id="listaCaps"></div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('manga');
        
        // Cargar datos
        fetch('mangas.json').then(r => r.json()).then(data => {
            const m = data.find(x => x.id === id);
            if(!m) return;
            document.getElementById('mangaImg').src = m.imagen;
            document.getElementById('mangaTitle').innerText = m.titulo;
            document.getElementById('sinopsis').innerText = m.sinopsis;
            
            const list = document.getElementById('listaCaps');
            for(let i=1; i<=m.totalCaps; i++) {
                list.innerHTML += `
                    <a href="lector.html?manga=${id}&cap=${i}" class="cap-btn">
                        <span>Capítulo ${i}</span>
                        <span>Leer →</span>
                    </a>`;
            }
        });

        // Buscador
        function handleSearch(e) {
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`;
        }
    </script>
</body>
</html>
