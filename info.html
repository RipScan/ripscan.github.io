<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Info</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; --card: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 20px 5%; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); cursor: pointer; }
        .container { padding: 20px 5%; max-width: 800px; margin: auto; }
        .manga-header { display: flex; gap: 20px; margin-bottom: 30px; }
        .manga-header img { width: 180px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sinopsis { color: #aaa; line-height: 1.6; }
        .cap-list { display: grid; gap: 10px; margin-top: 20px; }
        .cap-btn { background: var(--card); padding: 15px; border-radius: 8px; text-decoration: none; color: white; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; }
        .cap-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <header><div class="logo" onclick="window.location.href='index.html'">RIPSCAN</div></header>
    <div class="container">
        <div class="manga-header">
            <img id="mangaImg" src="">
            <div>
                <h1 id="mangaTitle" style="margin:0">Cargando...</h1>
                <p id="sinopsis" class="sinopsis"></p>
            </div>
        </div>
        <h2 style="color:var(--accent)">Capítulos</h2>
        <div class="cap-list" id="listaCaps"></div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('manga');
        fetch('mangas.json').then(r => r.json()).then(data => {
            const m = data.find(x => x.id === id);
            if(!m) return;
            document.getElementById('mangaImg').src = m.imagen;
            document.getElementById('mangaTitle').innerText = m.titulo;
            document.getElementById('sinopsis').innerText = m.sinopsis;
            const list = document.getElementById('listaCaps');
            for(let i=1; i<=m.totalCaps; i++) {
                list.innerHTML += `<a href="lector.html?manga=${id}&cap=${i}" class="cap-btn"><span>Capítulo ${i}</span><span>Leer →</span></a>`;
            }
        });
    </script>
</body>
</html>
