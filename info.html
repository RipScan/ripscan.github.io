<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Info</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header (Igual que el index) */
        header { padding: 20px 6%; background: rgba(18, 18, 18, 0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); cursor: pointer; }
        
        .container { padding: 40px 6%; max-width: 900px; margin: auto; }
        .manga-header { display: flex; gap: 30px; margin-bottom: 40px; background: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .manga-header img { width: 200px; height: 300px; object-fit: cover; border-radius: 8px; }
        
        /* Géneros y Estado */
        .badge { display: inline-block; background: #262626; color: #a1a1aa; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; font-size: 0.8rem; margin-right: 5px; margin-bottom: 5px; }
        .status-tag { color: var(--accent-primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; display: block; }

        /* Estilo de Capítulos (Igual a la imagen) */
        .chapter-list { display: flex; flex-direction: column; gap: 10px; }
        .cap-btn { background: #121212; padding: 10px; border-radius: 8px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .cap-thumb { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; }
        .cap-info { flex-grow: 1; }
        .cap-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .cap-meta { color: var(--text-muted); font-size: 0.75rem; display: flex; gap: 10px; align-items: center; }
        .eye-icon { font-size: 1.2rem; cursor: pointer; }

        .btn-action { background: #1a1a1a; padding: 10px 20px; border-radius: 6px; text-decoration: none; color: white; border: 1px solid #333; display: inline-block; margin-right: 10px; font-size: 0.9rem;}
        
        @media (max-width: 600px) { .manga-header { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-text" onclick="location.href='index.html'">RIPSCAN</div>
    </header>

    <div class="container">
        <div class="manga-header">
            <img id="mangaImg" src="">
            <div>
                <h1 id="mangaTitle">Cargando...</h1>
                <span id="mangaStatus" class="status-tag"></span>
                <div id="mangaGenres" style="margin-bottom: 15px;"></div>
                <p id="sinopsis" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;"></p>
                <a id="btnPrimero" class="btn-action">Primer Cap</a>
                <a id="btnUltimo" class="btn-action">Último Cap</a>
            </div>
        </div>

        <h2>Lista de Capítulos</h2>
        <br>
        <div id="listaCaps" class="chapter-list"></div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('manga');

        fetch('mangas.json').then(r => r.json()).then(data => {
            const m = data.find(x => x.id === id);
            if (!m) return;
            
            // Info Header
            document.getElementById('mangaImg').src = m.imagen;
            document.getElementById('mangaTitle').innerText = m.titulo;
            document.getElementById('mangaStatus').innerText = "Estado: " + m.estado.toUpperCase();
            document.getElementById('sinopsis').innerText = m.sinopsis;
            document.getElementById('btnPrimero').href = `lector.html?manga=${id}&cap=1`;
            document.getElementById('btnUltimo').href = `lector.html?manga=${id}&cap=${m.totalCaps}`;
            
            // Géneros
            document.getElementById('mangaGenres').innerHTML = m.generos.map(g => `<span class="badge">${g}</span>`).join('');

            // Capítulos (Layout estilo imagen)
            const list = document.getElementById('listaCaps');
            for(let i=m.totalCaps; i>=1; i--) { // Orden inverso para que el último esté arriba
                list.innerHTML += `
                    <div class="cap-btn">
                        <img src="${m.imagen}" class="cap-thumb">
                        <div class="cap-info">
                            <h4>Capítulo ${i}</h4>
                            <div class="cap-meta">
                                <span>En español</span>
                                <span><i class="fa-regular fa-calendar-days"></i> 04-05-2026</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-eye-slash eye-icon" style="color: #555;"></i>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
