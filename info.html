<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Info</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header con 3 columnas */
        header { padding: 15px 6%; background: rgba(18, 18, 18, 0.95); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .header-left { flex: 1; display: flex; justify-content: flex-start; }
        .header-center { flex: 1; display: flex; justify-content: center; }
        .header-right { flex: 1; display: flex; justify-content: flex-end; }

        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); cursor: pointer; }
        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-menu a:hover { color: var(--accent-primary); }
        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; width: 200px; }
        
        .container { padding: 40px 6%; max-width: 900px; margin: auto; }
        .manga-header { display: flex; gap: 30px; margin-bottom: 40px; background: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .manga-header img { width: 200px; height: 300px; object-fit: cover; border-radius: 8px; }
        
        .badge { display: inline-block; background: #262626; color: #a1a1aa; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; font-size: 0.8rem; margin-right: 5px; margin-bottom: 5px; }
        .status-tag { color: var(--accent-primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; display: block; }

        /* Lista de Capítulos */
        .chapter-list { display: flex; flex-direction: column; gap: 10px; }
        .cap-btn { background: #121212; padding: 10px; border-radius: 8px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; color: white; }
        .cap-btn:hover { border-color: var(--accent-primary); }
        .cap-thumb { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; }
        .cap-info { flex-grow: 1; }
        .cap-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .cap-meta { color: var(--text-muted); font-size: 0.75rem; display: flex; gap: 10px; align-items: center; }
        .eye-icon { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }

        .btn-action { background: #1a1a1a; padding: 10px 20px; border-radius: 6px; text-decoration: none; color: white; border: 1px solid #333; display: inline-block; margin-right: 10px; font-size: 0.9rem; cursor: pointer;}
        
        @media (max-width: 600px) { .manga-header { flex-direction: column; } .nav-menu { gap: 15px; font-size: 0.8rem; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-text" onclick="location.href='index.html'">RIPSCAN</div>
        </div>
        <div class="header-center">
            <nav class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="mis-manhwas.html">Mis Manhwas</a>
            </nav>
        </div>
        <div class="header-right">
            <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">
        </div>
    </header>

    <div class="container">
        <div class="manga-header">
            <img id="mangaImg" src="">
            <div>
                <h1 id="mangaTitle">Cargando...</h1>
                <span id="mangaStatus" class="status-tag"></span>
                <div id="mangaGenres" style="margin-bottom: 15px;"></div>
                <p id="sinopsis" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;"></p>
                <a id="btnPrimero" class="btn-action">Primer Cap</a>
                <a id="btnUltimo" class="btn-action">Último Cap</a>
                <button id="btnFav" class="btn-action" onclick="toggleFavorite()">
                    <i class="fa-regular fa-heart"></i> Favorito
                </button>
            </div>
        </div>

        <h2>Lista de Capítulos 
            <i class="fa-solid fa-sort" onclick="toggleSort()" style="cursor:pointer; font-size: 1rem; color: var(--accent-primary); margin-left: 10px;"></i>
        </h2>
        <br>
        <div id="listaCaps" class="chapter-list"></div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('manga');
        let mangaData = null;
        let sortOrder = 'asc'; // Ascendente por defecto

        function handleSearch(e) {
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`;
        }

        function toggleSort() {
            sortOrder = (sortOrder === 'desc') ? 'asc' : 'desc';
            renderChapters();
        }

        // Favoritos
        function toggleFavorite() {
            let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            const btn = document.getElementById('btnFav');
            if (favs.includes(id)) {
                favs = favs.filter(x => x !== id);
                btn.innerHTML = '<i class="fa-regular fa-heart"></i> Favorito';
            } else {
                favs.push(id);
                btn.innerHTML = '<i class="fa-solid fa-heart" style="color: #ff4d4d;"></i> Favorito';
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
        }

        function checkFavorite() {
            const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            const btn = document.getElementById('btnFav');
            if (favs.includes(id)) {
                btn.innerHTML = '<i class="fa-solid fa-heart" style="color: #ff4d4d;"></i> Favorito';
            }
        }

        function toggleRead(event, mangaId, cap, element) {
            event.preventDefault();
            event.stopPropagation();
            
            let read = JSON.parse(localStorage.getItem(`read_${mangaId}`) || '[]');
            if (read.includes(cap)) {
                read = read.filter(c => c !== cap);
                element.classList.replace('fa-eye', 'fa-eye-slash');
                element.style.color = '#555';
            } else {
                read.push(cap);
                element.classList.replace('fa-eye-slash', 'fa-eye');
                element.style.color = 'var(--accent-primary)';
            }
            localStorage.setItem(`read_${mangaId}`, JSON.stringify(read));
        }

        function renderChapters() {
            if (!mangaData) return;
            const list = document.getElementById('listaCaps');
            const readCaps = JSON.parse(localStorage.getItem(`read_${id}`) || '[]');
            list.innerHTML = '';

            const start = (sortOrder === 'desc') ? mangaData.totalCaps : 1;
            const end = (sortOrder === 'desc') ? 1 : mangaData.totalCaps;
            const step = (sortOrder === 'desc') ? -1 : 1;

            for(let i = start; (sortOrder === 'desc' ? i >= end : i <= end); i += step) {
                const isRead = readCaps.includes(i);
                list.innerHTML += `
                    <a href="lector.html?manga=${id}&cap=${i}" class="cap-btn">
                        <img src="${mangaData.imagen}" class="cap-thumb">
                        <div class="cap-info">
                            <h4>Capítulo ${i}</h4>
                            <div class="cap-meta">
                                <span>En español</span>
                                <span><i class="fa-regular fa-calendar-days"></i> 04-05-2026</span>
                            </div>
                        </div>
                        <i class="fa-solid ${isRead ? 'fa-eye' : 'fa-eye-slash'} eye-icon" 
                           style="color: ${isRead ? 'var(--accent-primary)' : '#555'}" 
                           onclick="toggleRead(event, '${id}', ${i}, this)"></i>
                    </a>
                `;
            }
        }

        fetch('mangas.json').then(r => r.json()).then(data => {
            mangaData = data.find(x => x.id === id);
            if (!mangaData) return;
            
            document.getElementById('mangaImg').src = mangaData.imagen;
            document.getElementById('mangaTitle').innerText = mangaData.titulo;
            document.getElementById('mangaStatus').innerText = "Estado: " + mangaData.estado.toUpperCase();
            document.getElementById('sinopsis').innerText = mangaData.sinopsis;
            document.getElementById('btnPrimero').href = `lector.html?manga=${id}&cap=1`;
            document.getElementById('btnUltimo').href = `lector.html?manga=${id}&cap=${mangaData.totalCaps}`;
            document.getElementById('mangaGenres').innerHTML = mangaData.generos.map(g => `<span class="badge">${g}</span>`).join('');

            checkFavorite();
            renderChapters(); 
        });
    </script>
</body>
</html>
