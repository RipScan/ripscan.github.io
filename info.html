<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RipScan | Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-deep: #050505; --bg-surface: #121212; --accent-primary: #a855f7; --text-main: #ffffff; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }
        
        header { padding: 20px 6%; background: #121212; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { cursor: pointer; font-size: 1.5rem; color: var(--accent-primary); }

        .container { padding: 40px 6%; max-width: 1000px; margin: auto; }
        .manga-header { display: flex; gap: 40px; }
        .manga-header img { width: 300px; border-radius: 15px; border: 2px solid #222; }
        
        h1 { color: var(--accent-primary); font-size: 2.5rem; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-right: 10px; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-fav { background: #222; color: white; }
        .btn-fav.active { background: #333; color: var(--accent-primary); border: 1px solid var(--accent-primary); }

        .cap-btn { background: #121212; padding: 15px; margin: 10px 0; border: 1px solid #222; border-radius: 8px; display: flex; justify-content: space-between; text-decoration: none; color: white; }
        .cap-btn:hover { border-color: var(--accent-primary); }
    </style>
</head>
<body>
    <header>
        <div class="logo-container" onclick="location.href='index.html'"><i class="fa-solid fa-skull"></i> RIPSCAN</div>
        <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">
    </header>

    <div class="container">
        <div class="manga-header">
            <img id="mangaImg">
            <div>
                <h1 id="mangaTitle">Cargando...</h1>
                <p id="sinopsis" style="margin: 20px 0; color: #ccc;"></p>
                <a id="btnPrimero" class="btn btn-primary">Primer Capítulo</a>
                <button id="btnFav" class="btn btn-fav" onclick="toggleFav()">❤️ Favoritos</button>
            </div>
        </div>
        <h2 style="margin-top: 40px;">Capítulos</h2>
        <div id="listaCaps"></div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('manga');
        
        fetch('mangas.json').then(r => r.json()).then(data => {
            const m = data.find(x => x.id === id);
            document.getElementById('mangaImg').src = m.imagen;
            document.getElementById('mangaTitle').innerText = m.titulo;
            document.getElementById('sinopsis').innerText = m.sinopsis;
            document.getElementById('btnPrimero').href = `lector.html?manga=${id}&cap=1`;
            
            const list = document.getElementById('listaCaps');
            for(let i=1; i<=m.totalCaps; i++) {
                list.innerHTML += `<a href="lector.html?manga=${id}&cap=${i}" class="cap-btn"><span>Capítulo ${i}</span><span>Leer</span></a>`;
            }
        });

        function toggleFav() {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if (favs.includes(id)) { favs = favs.filter(i => i !== id); document.getElementById('btnFav').classList.remove('active'); }
            else { favs.push(id); document.getElementById('btnFav').classList.add('active'); }
            localStorage.setItem('favs', JSON.stringify(favs));
        }
    </script>
</body>
</html>
