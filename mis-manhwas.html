<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Mis Manhwas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header Grid para centrado */
        header { 
            padding: 20px 6%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px);
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; 
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; 
        }

        .menu-trigger { font-size: 1.5rem; cursor: pointer; display: none; }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); letter-spacing: 1px; cursor: pointer; text-align: center; }
        
        .header-right-side { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-menu a:hover { color: var(--accent-primary); }
        
        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; width: 200px; }

        /* Menú Móvil */
        .mobile-menu { 
            display: none; position: absolute; top: 75px; left: 0; width: 100%; 
            background: var(--bg-surface); padding: 20px; border-bottom: 1px solid #333; z-index: 999;
            flex-direction: column; gap: 15px; text-align: center;
        }
        .mobile-menu a { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 600; }

        /* Contenido */
        .container { padding: 40px 6%; max-width: 900px; margin: auto; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .manga-card { background: var(--bg-surface); border-radius: 8px; overflow: hidden; border: 1px solid #222; text-decoration: none; color: white; transition: 0.3s; display: block; }
        .manga-card:hover { border-color: var(--accent-primary); transform: translateY(-5px); }
        .manga-card img { width: 100%; height: 220px; object-fit: cover; }
        .manga-card h3 { font-size: 0.9rem; padding: 10px 10px 5px 10px; }
        .last-read-tag { font-size: 0.75rem; color: var(--text-muted); padding: 0 10px 10px 10px; font-weight: 500; }

        /* Media Queries */
        @media (max-width: 768px) {
            .menu-trigger { display: block; }
            .nav-menu { display: none; }
            #search { width: 100px; }
            .container { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-bars menu-trigger" onclick="toggleMenu()"></i>
        <div class="logo-text" onclick="location.href='index.html'">RIPSCAN</div>
        
        <div class="header-right-side">
            <nav class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="mis-manhwas.html" style="color: var(--accent-primary);">Mis Manhwas</a>
            </nav>
            <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">
        </div>
    </header>

    <div id="mobileMenu" class="mobile-menu">
        <a href="index.html">Inicio</a>
        <a href="mis-manhwas.html">Mis Manhwas</a>
    </div>

    <div class="container">
        <h1>Mis Favoritos</h1>
        <div id="favList" class="manga-grid"></div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function handleSearch(e) {
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`;
        }

        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        const favList = document.getElementById('favList');

        fetch('mangas.json').then(r => r.json()).then(data => {
            const myFavs = data.filter(m => favs.includes(m.id));

            if (myFavs.length === 0) {
                favList.innerHTML = '<p style="color: var(--text-muted)">Aún no has agregado favoritos.</p>';
            } else {
                myFavs.forEach(m => {
                    const readData = JSON.parse(localStorage.getItem(`read_${m.id}`) || '[]');
                    const lastRead = readData.length > 0 ? Math.max(...readData) : 0;
                    const label = lastRead > 0 ? `Visto: Cap ${lastRead}` : "No leído";

                    favList.innerHTML += `
                        <a href="info.html?manga=${m.id}" class="manga-card">
                            <img src="${m.imagen}" alt="${m.titulo}">
                            <h3>${m.titulo}</h3>
                            <div class="last-read-tag">${label}</div>
                        </a>
                    `;
                });
            }
        });
    </script>
</body>
</html>
