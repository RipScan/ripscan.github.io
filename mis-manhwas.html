<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RipScan | Mis Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #050505; --accent-primary: #a855f7; }
        body { background: var(--bg-deep); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .container { padding: 40px 6%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .card { background: #121212; border-radius: 12px; padding: 10px; border: 1px solid #222; text-decoration: none; color: white; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: var(--accent-primary);">Mis Favoritos</h2>
        <div class="grid" id="mangaGrid"></div>
    </div>

    <script>
        fetch('mangas.json').then(r => r.json()).then(data => {
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            const filtered = data.filter(m => favs.includes(m.id));
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = filtered.map(m => `
                <a href="info.html?manga=${m.id}" class="card">
                    <img src="${m.imagen}">
                    <h3>${m.titulo}</h3>
                </a>
            `).join('') || "<p>Aún no tienes favoritos.</p>";
        });
    </script>
</body>
</html>
