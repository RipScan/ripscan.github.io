<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos | RipScan</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header Consistente */
        header { padding: 20px 6%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo-container { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 1.8rem; color: var(--accent-primary); }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); letter-spacing: 1px; }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-menu a:hover { color: var(--accent-primary); }

        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; width: 250px; }

        /* Menú Hamburguesa (oculto en PC) */
        .menu-btn { display: none; font-size: 1.5rem; cursor: pointer; color: white; }
        .mobile-nav { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #111; padding: 20px; border-bottom: 1px solid #333; flex-direction: column; gap: 15px; z-index: 999; }
        .mobile-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 1.2rem; }

        /* Contenido */
        .container { padding: 40px 6%; }
        h2 { color: var(--text-main); margin-bottom: 25px; font-size: 1.5rem; }

        /* Grid de Manhwas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .card { background: var(--bg-surface); border-radius: 12px; padding: 10px; border: 1px solid #222; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-primary); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 0.9rem; margin-top: 10px; color: var(--text-main); }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            header { position: relative; padding: 15px 4%; }
            .nav-menu { display: none; }
            .menu-btn { display: block; }
            .logo-container { position: absolute; left: 50%; transform: translateX(-50%); }
            #search { width: 100px; padding: 6px 12px; font-size: 0.8rem; }
            
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="logo-container" onclick="location.href='index.html'">
            <i class="fa-solid fa-skull logo-icon"></i>
            <span class="logo-text">RIPSCAN</span>
        </div>

        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html" style="color: var(--accent-primary);">Mis Manhwas</a>
        </nav>

        <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">

        <div class="mobile-nav" id="mobileMenu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html">Mis Manhwas</a>
        </div>
    </header>

    <div class="container">
        <h2>Mis Favoritos</h2>
        <div class="grid" id="mangaGrid"></div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function handleSearch(e) {
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`;
        }

        fetch('mangas.json').then(r => r.json()).then(data => {
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            const filtered = data.filter(m => favs.includes(m.id));
            const grid = document.getElementById('mangaGrid');
            
            grid.innerHTML = filtered.length > 0 ? 
                filtered.map(m => `
                    <a href="info.html?manga=${m.id}" class="card">
                        <img src="${m.imagen}">
                        <h3>${m.titulo}</h3>
                    </a>
                `).join('') : 
                "<p style='color: var(--text-muted);'>No tienes favoritos todavía.</p>";
        });
    </script>
</body>
</html>
