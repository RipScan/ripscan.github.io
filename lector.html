<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Lector</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header con transición */
        header { 
            padding: 20px 6%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; 
            position: sticky; top: 0; z-index: 1000; 
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; 
        }

        .logo-container { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: var(--accent-primary); letter-spacing: 1px; }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-menu a:hover { color: var(--accent-primary); }

        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; width: 250px; }

        /* Lector Nav con transición */
        .reader-nav { 
            padding: 15px; display: flex; justify-content: center; gap: 15px; 
            background: #0d0d0d; border-bottom: 1px solid #222; 
            position: sticky; top: 75px; z-index: 900; 
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; 
        }
        .btn { color: white; text-decoration: none; background: #1a1a1a; padding: 10px 20px; border-radius: 6px; font-weight: 600; border: 1px solid #333; transition: 0.3s; }
        .btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
        
        .lector-img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            header { padding: 15px 4%; }
            .nav-menu { display: none; }
            .menu-btn { display: block; }
            .logo-container { position: absolute; left: 50%; transform: translateX(-50%); }
            #search { width: 100px; padding: 6px 12px; font-size: 0.8rem; }
            .reader-nav { top: 60px; } 
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="logo-container" onclick="location.href='index.html'">
            <span class="logo-text">RIPSCAN</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html">Mis Manhwas</a>
        </nav>
        <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">
    </header>

    <div class="reader-nav">
        <a id="btnPrev" class="btn">⬅ Ant</a>
        <a id="btnInfo" class="btn">Info</a>
        <a id="btnNext" class="btn">Sig ➡</a>
    </div>

    <div id="container" style="padding-top:20px;"></div>

    <script>
        // 1. Lógica de Scroll mejorada
        let lastScrollTop = 0;
        const header = document.querySelector('header');
        const readerNav = document.querySelector('.reader-nav');

        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                header.style.transform = 'translateY(-100%)';
                readerNav.style.transform = 'translateY(-100%)';
                header.style.opacity = '0';
                readerNav.style.opacity = '0';
            } else {
                header.style.transform = 'translateY(0)';
                readerNav.style.transform = 'translateY(0)';
                header.style.opacity = '1';
                readerNav.style.opacity = '1';
            }
            lastScrollTop = scrollTop;
        });

        // 2. Configuración de parámetros
        const p = new URLSearchParams(window.location.search);
        const id = p.get('manga'), cap = parseInt(p.get('cap'));
        document.getElementById('btnInfo').href = `info.html?manga=${id}`;
        document.getElementById('btnNext').href = `lector.html?manga=${id}&cap=${cap + 1}`;
        if(cap > 1) {
            document.getElementById('btnPrev').href = `lector.html?manga=${id}&cap=${cap - 1}`;
        } else {
            document.getElementById('btnPrev').style.display = "none";
        }

        // 3. Sistema de carga en 3 pasos (Créditos -> Páginas -> Créditos)
        function loadSingleImage(filename, callback) {
            const img = new Image();
            img.src = `mangas/${id}/cap-${cap}/${filename}`;
            img.className = "lector-img";
            img.onload = () => { 
                document.getElementById('container').appendChild(img); 
                if(callback) callback(); 
            };
            img.onerror = () => { if(callback) callback(); }; // Si no existe, sigue igual
        }

        function loadNumberedPages(pageNumber) {
            const img = new Image();
            img.src = `mangas/${id}/cap-${cap}/${String(pageNumber).padStart(3, '0')}.png`;
            img.className = "lector-img";
            img.onload = () => { 
                document.getElementById('container').appendChild(img); 
                loadNumberedPages(pageNumber + 1); // Siguiente página
            };
            img.onerror = () => { 
                // Al terminar las páginas numeradas, cargamos el crédito final
                loadSingleImage('999_creditos.png');
            };
        }

        // Inicio: Cargar créditos iniciales -> luego páginas numeradas
        loadSingleImage('000_creditos.png', () => {
            loadNumberedPages(1);
        });

        function handleSearch(e) { 
            if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`; 
        }
    </script>
</body>
</html>
