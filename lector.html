<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Lector</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; }
        
        header { padding: 25px 5%; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); cursor: pointer; }
        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: #fff; text-decoration: none; font-size: 1rem; transition: 0.3s; }
        .nav-menu a:hover { color: var(--accent); }
        #search { background: #111; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; width: 200px; }

        .reader-nav { padding: 15px; display: flex; justify-content: center; gap: 15px; background: #0d0d0d; border-bottom: 1px solid #222; }
        .btn { color: white; text-decoration: none; background: #1a1a1a; padding: 10px 20px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        .lector-img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">RIPSCAN</div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html" style="color:var(--accent);">Mis Manhwas</a>        </nav>
        <input type="text" id="search" placeholder="🔍 Buscar..." onkeyup="handleSearch(event)">
    </header>

    <div class="reader-nav">
        <a id="btnPrev" class="btn">⬅ Ant</a>
        <a id="btnInfo" class="btn">Info</a>
        <a id="btnNext" class="btn">Sig ➡</a>
    </div>

    <div id="container" style="padding-top:20px;"></div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const id = p.get('manga'), cap = parseInt(p.get('cap'));
        document.getElementById('btnInfo').href = `info.html?manga=${id}`;
        document.getElementById('btnNext').href = `lector.html?manga=${id}&cap=${cap + 1}`;
        if(cap > 1) document.getElementById('btnPrev').href = `lector.html?manga=${id}&cap=${cap - 1}`;
        else document.getElementById('btnPrev').style.display = "none";

        let page = 1;
        function load() {
            const img = new Image();
            img.src = `mangas/${id}/cap-${cap}/${String(page).padStart(3, '0')}.png`;
            img.className = "lector-img";
            img.onerror = () => { if(page > 1) console.log("Fin del capítulo"); };
            img.onload = () => { document.getElementById('container').appendChild(img); page++; load(); };
        }
        load();
        function handleSearch(e) { if(e.key === 'Enter') window.location.href = `index.html?search=${e.target.value}`; }
    </script>
</body>
</html>
