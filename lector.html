<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RipScan | Lector</title>
    <style>
        body { background: #000; color: white; text-align: center; margin: 0; padding: 20px; }
        .reader-nav { position: sticky; top: 0; background: #121212; padding: 15px; z-index: 100; border-bottom: 1px solid #333; }
        #viewer { max-width: 800px; margin: 20px auto; }
        img { width: 100%; display: block; margin-bottom: 5px; }
        .btn { background: #a855f7; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="reader-nav">
        <a href="index.html" class="btn">Volver a Inicio</a>
        <span id="capInfo" style="margin: 0 20px;">Capítulo X</span>
    </div>
    <div id="viewer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const manga = params.get('manga');
        const cap = params.get('cap');
        document.getElementById('capInfo').innerText = `Capítulo ${cap}`;
        
        // Asumiendo que tus imágenes están en: img/mangas/manga-id/cap-num/1.jpg, 2.jpg...
        // Aquí puedes cambiar el límite de páginas si lo necesitas
        const viewer = document.getElementById('viewer');
        for(let i=1; i<=10; i++) {
            viewer.innerHTML += `<img src="img/mangas/${manga}/${cap}/${i}.jpg" onerror="this.style.display='none'">`;
        }
    </script>
</body>
</html>
