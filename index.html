<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Biblioteca</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Header Mejorado */
        header { 
            padding: 15px 5%; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); cursor: pointer; letter-spacing: -1px; }
        
        /* Nueva navegación */
        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a { color: #aaa; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-menu a:hover { color: var(--accent); }
        
        /* Buscador */
        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; width: 150px; outline: none; }
        #search:focus { border-color: var(--accent); }

        /* Grid */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--card); border-radius: 16px; padding: 12px; border: 1px solid #1a1a1a; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none; color: white; display: block;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 0 15px rgba(0,212,255,0.15); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; }
        .card h3 { font-size: 0.95rem; margin: 12px 0 5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">RIPSCAN</div>
        
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="#" onclick="alert('Esta sección es tu biblioteca actual')">Mis Manhwas</a>
        </nav>

        <input type="text" id="search" placeholder="🔍 Buscar..." onkeyup="filter()">
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px;">Biblioteca</h2>
        <div class="grid" id="mangaGrid"></div>
    </div>

    <script>
        let mangaData = [];
        fetch('mangas.json').then(res => res.json()).then(data => {
            mangaData = data;
            render(data);
        });

        function render(data) {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = data.map(m => `
                <a href="info.html?manga=${m.id}" class="card">
                    <img src="${m.imagen}" alt="${m.titulo}">
                    <h3>${m.titulo}</h3>
                </a>
            `).join('');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            render(mangaData.filter(m => m.titulo.toLowerCase().includes(m.titulo.toLowerCase().includes(val))));
        }
    </script>
</body>
</html>
