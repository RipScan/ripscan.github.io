<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>
<link rel="icon" href="ripscan.ico" type="image/x-icon">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,85,247,0.2), transparent),
    radial-gradient(circle at 80% 70%, rgba(88,101,242,0.2), transparent);
  animation:fondoMove 12s infinite alternate ease-in-out;
  z-index:1;
}

@keyframes fondoMove{
  0%{transform:scale(1)}
  100%{transform:scale(1.2)}
}

#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

header,.container,#vista-dia,.discord,.footer{
  position:relative;
  z-index:2;
}

header{text-align:center;padding:40px}
.subtitle{opacity:0.7;letter-spacing:3px}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  max-width:220px;
  margin:auto;
}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:0.5s;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}
.card h3{position:absolute;bottom:10px;left:10px;z-index:2}
.preview{
  position:absolute;
  bottom:30px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:6px;
  z-index:2;
}

.card:hover{transform:translateY(-10px) scale(1.05)}
.card:hover img{transform:scale(1.15)}

#vista-dia{display:none;opacity:0;transition:0.4s}
#vista-dia.active{display:block;opacity:1}

.volver{
  display:flex;
  align-items:center;
  gap:8px;
  margin:20px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #a855f7;
  color:white;
  cursor:pointer;
}
.volver:hover{
  background:#a855f7;
  box-shadow:0 0 20px #a855f7;
}

.discord{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #5865F2;
  text-decoration:none;
  color:white;
}
.discord:hover{
  background:#5865F2;
  box-shadow:0 0 20px #5865F2;
}

#cuervo{
  position:fixed;
  top:20%;
  left:-200px;
  width:100px;
  z-index:2;
  animation:vuelo 20s linear infinite;
}
@keyframes vuelo{
  0%{left:-200px}
  100%{left:110%}
}

.footer{
  text-align:center;
  opacity:0.5;
  font-size:12px;
  margin:40px 0 20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<img src="cuervo.gif" id="cuervo">

<header>
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="container" id="inicio">

<div class="card" onclick="mostrarDia('lunes')"><img src="reyhongo.png"><h3>LUNES</h3></div>
<div class="card" onclick="mostrarDia('martes')"><img src="proximamente.png"><div class="preview">Próximamente</div><h3>MARTES</h3></div>
<div class="card" onclick="mostrarDia('miercoles')"><img src="pequenomundo.png"><h3>MIÉRCOLES</h3></div>

<!-- JUEVES MODIFICADO -->
<div class="card" onclick="mostrarDia('jueves')"><img src="desierto.png"><h3>JUEVES</h3></div>

<div class="card" onclick="mostrarDia('viernes')"><img src="proximamente.png"><div class="preview">Próximamente</div><h3>VIERNES</h3></div>
<div class="card" onclick="mostrarDia('sabado')"><img src="proximamente.png"><div class="preview">Próximamente</div><h3>SÁBADO</h3></div>
<div class="card" onclick="mostrarDia('domingo')"><img src="margrave.png"><h3>DOMINGO</h3></div>

</div>

<div id="vista-dia">
  <button class="volver" onclick="volver()">
    <img src="volver.png" width="18"> Volver
  </button>

  <h2 id="titulo" style="text-align:center;margin-bottom:20px;"></h2>
  <div class="container" id="contenido"></div>
</div>

<a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">
  <img src="discord.gif" width="20"> Discord
</a>

<footer class="footer">
  Los horarios pueden variar sin previo aviso. <br>
  <span style="opacity:0.7;">RipScan ©</span>
</footer>

<script>
const data={
  lunes:[{nombre:"El ascenso del Rey Hongo",img:"reyhongo.png",link:"https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224"}],
  martes:[],
  miercoles:[{nombre:"Un pequeño mundo lleno de diversion",img:"pequenomundo.png",link:"https://manhwaweb.com/manhwa/un-pequeo-mundo-lleno-de-diversion_1776474759366"}],

  // JUEVES AGREGADO
  jueves:[
    {
      nombre:"El mago de arena del desierto abrasador",
      img:"desierto.png",
      link:"https://manhwaweb.com/manhwa/el-mago-de-arena-del-desierto-abrasador_1776986673948"
    }
  ],

  viernes:[],
  sabado:[],
  domingo:[{nombre:"El mago sin valor del Margrave",img:"margrave.png",link:"https://manhwaweb.com/manhwa/el-mago-sin-valor-del-margrave_1776633397302"}]
};

function mostrarDia(dia){
  document.getElementById("inicio").style.display="none";
  document.getElementById("vista-dia").classList.add("active");

  document.getElementById("titulo").innerText=dia.toUpperCase();
  const contenido=document.getElementById("contenido");
  contenido.innerHTML="";

  if(data[dia].length===0){
    contenido.innerHTML="<p style='text-align:center;opacity:0.6;'>No hay proyectos programados para este día.</p>";
    return;
  }

  data[dia].forEach(m=>{
    contenido.innerHTML+=`
    <div class="card">
      <img src="${m.img}">
      <h3>${m.nombre}</h3>
      <a href="${m.link}" target="_blank" style="position:absolute;inset:0;"></a>
    </div>`;
  });
}

function volver(){
  document.getElementById("inicio").style.display="grid";
  document.getElementById("vista-dia").classList.remove("active");
}

const diasSemana = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
const hoy = diasSemana[new Date().getDay()];

document.querySelectorAll(".card").forEach(card => {
  const onclick = card.getAttribute("onclick");
  if(onclick && onclick.includes(hoy)){
    card.style.boxShadow = "0 0 25px #a855f7";

    const badge = document.createElement("div");
    badge.innerText = "🔥 HOY";
    badge.style.position = "absolute";
    badge.style.top = "10px";
    badge.style.right = "10px";
    badge.style.background = "#a855f7";
    badge.style.padding = "4px 10px";
    badge.style.borderRadius = "10px";
    badge.style.fontSize = "12px";
    badge.style.fontWeight = "bold";

    card.appendChild(badge);
  }
});

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<100;i++){
  p.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;
    ctx.beginPath();
    ctx.arc(a.x,a.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,0.8)";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
