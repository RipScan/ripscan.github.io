<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#0d0d0d;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  max-width:1200px;
  margin:auto;
}

input{
  padding:8px;
  border-radius:8px;
  border:none;
  width:200px;
}

/* GRID MÁS CHICO */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:10px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}

.card img{
  width:100%;
  aspect-ratio:2/3;
}

.card:hover{
  transform:scale(1.05);
}

.info{
  padding:6px;
  font-size:11px;
}

/* BADGES */
.badge{
  position:absolute;
  top:4px;
  right:4px;
  background:#a855f7;
  font-size:9px;
  padding:2px 5px;
  border-radius:5px;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:4px;
  left:4px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  text-align:center;
  opacity:0.5;
  font-size:11px;
  margin:30px;
}
</style>
</head>

<body>

<div class="nav">
  <div>RipScan</div>
  <input type="text" id="search" placeholder="Buscar...">
</div>

<div class="container" id="caps"></div>

<div class="footer">
  Los horarios pueden variar sin previo aviso.
</div>

<script>
/* DATA */
let capsData = [
  {nombre:"Rey Hongo", cap:10, img:"reyhongo.png", fecha:"2026-04-20"},
  {nombre:"Margrave", cap:5, img:"margrave.png", fecha:"2026-04-19"},
  {nombre:"Pequeño Mundo", cap:3, img:"pequenomundo.png", fecha:"2026-04-18"}
];

/* FAVORITOS */
let favs = JSON.parse(localStorage.getItem("favs")||"[]");

function toggleFav(nombre){
  if(favs.includes(nombre)){
    favs = favs.filter(f=>f!==nombre);
  }else{
    favs.push(nombre);
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  render();
}

/* RENDER */
function render(){
  const cont = document.getElementById("caps");
  cont.innerHTML="";

  let filtro = document.getElementById("search").value.toLowerCase();

  let data = capsData
    .sort((a,b)=> new Date(b.fecha)-new Date(a.fecha));

  data.forEach(c=>{
    if(!c.nombre.toLowerCase().includes(filtro)) return;

    let badge="";
    if((new Date()-new Date(c.fecha))/1000 < 86400){
      badge='<div class="badge">NEW</div>';
    }

    let fav = favs.includes(c.nombre) ? "⭐" : "☆";

    cont.innerHTML+=`
    <div class="card">
      <div class="fav" onclick="toggleFav('${c.nombre}')">${fav}</div>
      ${badge}
      <img src="${c.img}">
      <div class="info">
        ${c.nombre}<br>
        Cap ${c.cap}
      </div>
    </div>`;
  });
}

/* BUSCADOR */
document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
