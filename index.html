<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#0f0f0f;color:white}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}

.preview{
  position:absolute;
  bottom:25px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:5px 8px;
}

.badge{position:absolute;top:10px;right:10px;padding:4px 8px;border-radius:20px;font-size:11px}
.new{background:red}
.manana{background:orange}
.proximo{background:gray}

/* PANEL ADMIN */
.admin-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#a855f7;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.panel{
  position:fixed;
  top:0;
  right:-350px;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.4s;
  overflow:auto;
}

.panel.active{right:0}

input,select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#a855f7;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="inicio"></div>

<div class="admin-btn" onclick="togglePanel()">⚙️ Admin</div>

<div class="panel" id="panel">
  <h3>Editar Manhwa</h3>

  <select id="dia">
    <option value="lunes">Lunes</option>
    <option value="martes">Martes</option>
    <option value="miercoles">Miércoles</option>
    <option value="jueves">Jueves</option>
    <option value="viernes">Viernes</option>
    <option value="sabado">Sábado</option>
    <option value="domingo">Domingo</option>
  </select>

  <input id="nombre" placeholder="Nombre">
  <input id="cap" placeholder="Capítulo">
  
  <select id="estado">
    <option value="nuevo">NEW</option>
    <option value="manana">MAÑANA</option>
    <option value="proximo">PRÓXIMO</option>
  </select>

  <input id="views" placeholder="Vistas">

  <button onclick="guardar()">Guardar</button>
</div>

<script>
/* CARGAR DATA */
let data = JSON.parse(localStorage.getItem("data")) || {
  lunes:[{nombre:"Rey Hongo",img:"reyhongo.png",cap:"1",estado:"nuevo",views:120}],
  martes:[],
  miercoles:[],
  jueves:[],
  viernes:[],
  sabado:[],
  domingo:[]
};

/* BADGE */
function badgeHTML(e){
  if(e==="nuevo") return '<div class="badge new">NEW</div>';
  if(e==="manana") return '<div class="badge manana">MAÑANA</div>';
  if(e==="proximo") return '<div class="badge proximo">PRÓXIMO</div>';
  return "";
}

/* RENDER */
function render(){
  const cont=document.getElementById("inicio");
  cont.innerHTML="";

  for(let dia in data){
    const m=data[dia][0];

    cont.innerHTML+=`
    <div class="card">
      ${m?badgeHTML(m.estado):""}
      <img src="${m?m.img:'proximamente.png'}">
      <div class="preview">
        ${m?m.nombre+"<br>Cap "+m.cap:"Vacío"}
      </div>
    </div>`;
  }
}

render();

/* PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("active");
}

/* GUARDAR */
function guardar(){
  const dia=document.getElementById("dia").value;

  data[dia]=[{
    nombre:document.getElementById("nombre").value,
    img:"proximamente.png",
    cap:document.getElementById("cap").value,
    estado:document.getElementById("estado").value,
    views:document.getElementById("views").value
  }];

  localStorage.setItem("data",JSON.stringify(data));
  render();
  alert("Guardado!");
}
</script>

</body>
</html>
