<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Biblioteca</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #121212;
            --accent-primary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Header */
        header { padding: 20px 6%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo-container { cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; }
        .logo-icon { font-size: 1.8rem; color: var(--accent-primary); }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .nav-menu a:hover { color: var(--accent-primary); }

        #search { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; width: 250px; }

        /* Contenido */
        .container { padding: 40px 6%; }
        h2 { font-size: 1.5rem; margin-bottom: 25px; color: var(--text-main); }

        /* Biblioteca Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background: var(--bg-surface); border-radius: 12px; padding: 10px; border: 1px solid #222; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-primary); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 0.9rem; margin-top: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Sección Últimas Actualizaciones (Vertical) */
        .updates-container { display: flex; flex-direction: column; gap: 20px; max-width: 800px; }
        .update-card { display: flex; gap: 20px; align-items: flex-start; }
        .update-thumb { width: 100px; height: 140px; object-fit: cover; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
        .update-info { flex-grow: 1; }
        .update-info h3 { margin-bottom: 10px; font-size: 1.2rem; }

        .chapter-list { display: flex; flex-direction: column; }
        .chapter-row { display: flex; justify-content: space-between; padding: 6px 0; align-items: center; }
        .chapter-link { color: var(--text-main); text-decoration: none; font-size: 0.95rem; }
        .chapter-time { color: var(--text-muted); font-size: 0.85rem; }
        .lock-icon { color: #fbbf24; margin-left: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='index.html'">
            <i class="fa-solid fa-skull logo-icon"></i>
            <span>RIPSCAN</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="mis-manhwas.html">Mis Manhwas</a>
        </nav>
        <input type="text" id="search" placeholder="Buscar..." onkeyup="handleSearch(event)">
    </header>

    <div class="container">
        <h2>Biblioteca</h2>
        <div class="grid" id="mangaGrid"></div>

        <h2>Latest Updates</h2>
        <div class="updates-container" id="latestUpdates"></div>
    </div>

    <script>
        function formatTimeAgo(isoDate) {
            const now = new Date();
            const past = new Date(isoDate);
            const diff = now - past;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);
            if (mins < 1) return "Recién";
            if (mins < 60) return `${mins}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;
            return `${Math.floor(days/7)}s`;
        }

        function handleSearch(e) {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = window.allData.filter(m => m.titulo.toLowerCase().includes(query));
            render(filtered);
        }

        function render(data) {
            document.getElementById('mangaGrid').innerHTML = data.map(m => `
                <a href="info.html?manga=${m.id}" class="card">
                    <img src="${m.imagen}">
                    <h3>${m.titulo}</h3>
                </a>
            `).join('');
        }

        fetch('mangas.json').then(res => res.json()).then(data => {
            window.allData = data;
            render(data);
            
            const conUpdates = data.filter(m => m.ultimosCaps && m.ultimosCaps.length > 0)
                                   .sort((a,b) => new Date(b.ultimosCaps[0].fecha) - new Date(a.ultimosCaps[0].fecha));

            document.getElementById('latestUpdates').innerHTML = conUpdates.slice(0, 5).map(m => `
                <div class="update-card">
                    <img src="${m.imagen}" class="update-thumb" onclick="location.href='info.html?manga=${m.id}'">
                    <div class="update-info">
                        <h3>${m.titulo}</h3>
                        <div class="chapter-list">
                            ${m.ultimosCaps.map(c => `
                                <div class="chapter-row">
                                    <a href="lector.html?manga=${m.id}&cap=${c.numero}" class="chapter-link">
                                        Capítulo ${c.numero} ${c.bloqueado ? '<i class="fa-solid fa-lock lock-icon"></i>' : ''}
                                    </a>
                                    <span class="chapter-time">${formatTimeAgo(c.fecha)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
