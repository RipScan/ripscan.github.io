<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Inicio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
}

/* FONDO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,85,247,0.2), transparent),
    radial-gradient(circle at 80% 70%, rgba(88,101,242,0.2), transparent);
  animation:fondoMove 12s infinite alternate ease-in-out;
  z-index:1;
}

@keyframes fondoMove{
  0%{transform:scale(1)}
  100%{transform:scale(1.2)}
}

/* PARTICULAS */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONTENIDO */
header,.container,.nav,.footer{
  position:relative;
  z-index:2;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
}
.nav a{
  text-decoration:none;
  color:white;
  opacity:0.7;
}
.nav a:hover{
  opacity:1;
}

/* HEADER */
header{text-align:center;padding:20px}
h1{font-size:28px}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  transition:0.4s;
}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}
.info{
  position:absolute;
  bottom:10px;
  left:10px;
  z-index:2;
  font-size:13px;
}

/* HOVER */
.card:hover{transform:scale(1.05)}

/* CUERVO */
#cuervo{
  position:fixed;
  top:20%;
  left:-200px;
  width:100px;
  z-index:2;
  animation:vuelo 20s linear infinite;
}
@keyframes vuelo{
  0%{left:-200px}
  100%{left:110%}
}

/* FOOTER */
.footer{
  text-align:center;
  opacity:0.5;
  font-size:12px;
  margin:40px 0 20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<img src="cuervo.gif" id="cuervo">

<!-- NAV -->
<div class="nav">
  <a href="index.html">Inicio</a>
  <a href="horarios.html">Horarios</a>
</div>

<header>
  <h1>Últimos capítulos</h1>
</header>

<div class="container">

<div class="card">
  <img src="reyhongo.png">
  <div class="info">
    El ascenso del Rey Hongo<br>
    Cap 10 • hace 2h
  </div>
</div>

<div class="card">
  <img src="margrave.png">
  <div class="info">
    El mago sin valor del Margrave<br>
    Cap 5 • hace 1 día
  </div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  Los horarios pueden variar sin previo aviso. <br>
  <span style="opacity:0.7;">RipScan ©</span>
</div>

<script>
/* PARTICULAS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
  p.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;
    ctx.beginPath();
    ctx.arc(a.x,a.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,0.8)";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
