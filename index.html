<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipScan | Biblioteca</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; --card: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 20px 5%; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); cursor: pointer; }
        #search { background: #111; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 20px; width: 150px; outline: none; }
        .section-title { padding: 20px 5% 0; color: var(--accent); font-size: 1.2rem; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 20px 5%; scroll-snap-type: x mandatory; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-item { scroll-snap-align: start; min-width: 200px; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; }
        .carousel-item img { width: 100%; height: 280px; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #1a1a1a; transition: 0.3s; text-decoration: none; color: white; }
        .card:hover { transform: scale(1.05); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 0.9rem; margin: 10px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="location.reload()">RIPSCAN</div>
        <input type="text" id="search" placeholder="🔍 Buscar..." onkeyup="filter()">
    </header>

    <h2 class="section-title">🔥 Destacados</h2>
    <div class="carousel" id="carousel"></div>

    <h2 class="section-title">Biblioteca</h2>
    <div class="grid" id="mangaGrid"></div>

    <script>
        let mangaData = [];
        fetch('mangas.json').then(res => res.json()).then(data => {
            mangaData = data;
            document.getElementById('carousel').innerHTML = data.slice(0, 5).map(m => `
                <div class="carousel-item"><a href="info.html?manga=${m.id}"><img src="${m.imagen}"></a></div>
            `).join('');
            render(data);
        }).catch(err => console.error("Error cargando JSON:", err));

        function render(data) {
            document.getElementById('mangaGrid').innerHTML = data.map(m => `
                <a href="info.html?manga=${m.id}" class="card">
                    <img src="${m.imagen}">
                    <h3>${m.titulo}</h3>
                </a>
            `).join('');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            render(mangaData.filter(m => m.titulo.toLowerCase().includes(val)));
        }
    </script>
</body>
</html>
