<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:white}

/* HEADER */
header{text-align:center;padding:30px}
.subtitle{opacity:.7;letter-spacing:3px}

/* VISITAS */
.stats{text-align:center;font-size:13px;opacity:.7}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{transform:scale(1.05)}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}

.preview{
  position:absolute;
  bottom:20px;
  left:10px;
  font-size:13px;
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:8px;
}

/* ADMIN BTN */
.admin-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#a855f7;
  padding:14px;
  border-radius:50%;
  font-size:20px;
  box-shadow:0 0 20px #a855f7;
  cursor:pointer;
  z-index:99999;
}

/* PANEL */
.panel{
  position:fixed;
  top:0;
  right:-350px;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:.4s;
  overflow:auto;
  z-index:99998;
}
.panel.active{right:0}

/* FORM */
input,select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#1a1a1a;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* VISTA DIA */
#vista-dia{display:none}
#vista-dia.active{display:block}
.volver{
  margin:20px;
  padding:10px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="stats" id="visitasTotales"></div>

<div class="container" id="inicio"></div>

<div id="vista-dia">
  <button class="volver" onclick="volver()">Volver</button>
  <h2 id="titulo" style="text-align:center"></h2>
  <div class="container" id="contenido"></div>
</div>

<div class="admin-btn" onclick="togglePanel()">⚙️</div>

<div class="panel" id="panel">
  <h3>Panel Admin</h3>

  <select id="dia">
    <option value="lunes">Lunes</option>
    <option value="martes">Martes</option>
    <option value="miercoles">Miércoles</option>
    <option value="jueves">Jueves</option>
    <option value="viernes">Viernes</option>
    <option value="sabado">Sábado</option>
    <option value="domingo">Domingo</option>
  </select>

  <input id="nombre" placeholder="Nombre">
  <input id="img" placeholder="Imagen (ej: reyhongo.png)">
  <input id="link" placeholder="Link">

  <button onclick="guardar()">Guardar</button>
</div>

<script>
/* VISITAS */
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);
document.getElementById("visitasTotales").innerText = "👁 "+visitas+" visitas";

/* DATA */
let data = JSON.parse(localStorage.getItem("data")) || {
  lunes:[{nombre:"Rey Hongo",img:"reyhongo.png",link:"#"}],
  martes:[],
  miercoles:[],
  jueves:[],
  viernes:[],
  sabado:[],
  domingo:[]
};

/* RENDER INICIO */
function render(){
  const cont=document.getElementById("inicio");
  cont.innerHTML="";

  for(let dia in data){
    const m=data[dia][0];

    cont.innerHTML+=`
    <div class="card" onclick="mostrarDia('${dia}')">
      <img src="${m?m.img:'proximamente.png'}">
      <div class="preview">
        ${m?m.nombre:"Vacío"}
      </div>
    </div>`;
  }
}

/* MOSTRAR DIA */
function mostrarDia(dia){
  inicio.style.display="none";
  vistaDia.classList.add("active");

  titulo.innerText=dia.toUpperCase();
  contenido.innerHTML="";

  if(data[dia].length===0){
    contenido.innerHTML="<p style='text-align:center;'>No hay contenido</p>";
    return;
  }

  data[dia].forEach(m=>{
    contenido.innerHTML+=`
    <div class="card">
      <img src="${m.img}">
      <h3 style="position:absolute;bottom:10px;left:10px;">${m.nombre}</h3>
      <a href="${m.link}" target="_blank" style="position:absolute;inset:0;"></a>
    </div>`;
  });
}

function volver(){
  inicio.style.display="grid";
  vistaDia.classList.remove("active");
}

/* PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("active");
}

/* GUARDAR */
function guardar(){
  const dia=document.getElementById("dia").value;

  data[dia]=[{
    nombre:document.getElementById("nombre").value,
    img:document.getElementById("img").value || "proximamente.png",
    link:document.getElementById("link").value || "#"
  }];

  localStorage.setItem("data",JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
