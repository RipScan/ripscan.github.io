<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
}

/* FONDO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,85,247,0.2), transparent),
    radial-gradient(circle at 80% 70%, rgba(88,101,242,0.2), transparent);
  animation:fondoMove 12s infinite alternate ease-in-out;
  z-index:1;
}

@keyframes fondoMove{
  0%{transform:scale(1)}
  100%{transform:scale(1.2)}
}

header,.container,#vista-dia,.discord,.stats{
  position:relative;
  z-index:2;
}

/* HEADER */
header{text-align:center;padding:30px}
.subtitle{opacity:0.7;letter-spacing:3px}

/* STATS */
.stats{
  text-align:center;
  margin-top:-20px;
  font-size:13px;
  opacity:0.7;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.card h3{position:absolute;bottom:10px;left:10px;z-index:2}

.preview{
  position:absolute;
  bottom:30px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:6px 10px;
  border-radius:8px;
  z-index:2;
}

/* BADGES */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  font-size:11px;
  font-weight:700;
  padding:4px 8px;
  border-radius:20px;
  z-index:3;
}

/* TIPOS */
.new{background:#ff2d55}
.manana{background:#f59e0b}
.proximo{background:#6b7280}

/* VISTAS */
.views{
  position:absolute;
  top:10px;
  left:10px;
  font-size:11px;
  background:rgba(0,0,0,0.6);
  padding:3px 6px;
  border-radius:6px;
  z-index:3;
}

/* HOVER */
.card:hover{transform:scale(1.05)}

/* VISTA DIA */
#vista-dia{display:none}
#vista-dia.active{display:block}

/* BOTON */
.volver{
  margin:20px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #a855f7;
  color:white;
  cursor:pointer;
}

/* DISCORD */
.discord{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #5865F2;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="stats" id="visitasTotales"></div>

<div class="container" id="inicio"></div>

<div id="vista-dia">
  <button class="volver" onclick="volver()">Volver</button>
  <h2 id="titulo" style="text-align:center"></h2>
  <div class="container" id="contenido"></div>
</div>

<a class="discord" href="#" target="_blank">Discord</a>

<script>
/* CONTADOR GLOBAL */
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);
document.getElementById("visitasTotales").innerText = "👁 " + visitas + " visitas";

/* DATA */
const data={
  lunes:[{nombre:"El ascenso del Rey Hongo",img:"reyhongo.png",cap:"1",estado:"nuevo",views:120}],
  martes:[],
  miercoles:[{nombre:"Un pequeño mundo lleno de diversion",img:"pequenomundo.png",cap:"3",estado:"manana",views:95}],
  jueves:[],
  viernes:[],
  sabado:[],
  domingo:[{nombre:"El mago sin valor del Margrave",img:"margrave.png",cap:"2",estado:"proximo",views:200}]
};

const dias=["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
const contenedor=document.getElementById("inicio");

/* BADGE DINAMICO */
function badgeHTML(estado){
  if(estado==="nuevo") return '<div class="badge new">NEW</div>';
  if(estado==="manana") return '<div class="badge manana">MAÑANA</div>';
  if(estado==="proximo") return '<div class="badge proximo">PRÓXIMO</div>';
  return "";
}

/* INICIO */
dias.forEach(dia=>{
  const item=data[dia][0];

  contenedor.innerHTML+=`
  <div class="card" onclick="mostrarDia('${dia}')">
    ${item ? badgeHTML(item.estado) : ''}
    ${item ? `<div class="views">👁 ${item.views}</div>` : ''}
    <img src="${item ? item.img : 'proximamente.png'}">
    <div class="preview">
      ${item ? item.nombre + "<br>Cap " + item.cap : "Próximamente"}
    </div>
    <h3>${dia.toUpperCase()}</h3>
  </div>`;
});

/* VISTA DIA */
function mostrarDia(dia){
  inicio.style.display="none";
  vistaDia.classList.add("active");

  titulo.innerText=dia.toUpperCase();
  contenido.innerHTML="";

  if(data[dia].length===0){
    contenido.innerHTML="<p style='text-align:center;opacity:0.6;'>No hay manhwas</p>";
    return;
  }

  data[dia].forEach(m=>{
    contenido.innerHTML+=`
    <div class="card">
      ${badgeHTML(m.estado)}
      <div class="views">👁 ${m.views}</div>
      <img src="${m.img}">
      <h3>${m.nombre}</h3>
      <div class="preview">Capítulo ${m.cap}</div>
    </div>`;
  });
}

function volver(){
  inicio.style.display="grid";
  vistaDia.classList.remove("active");
}
</script>

</body>
</html>
